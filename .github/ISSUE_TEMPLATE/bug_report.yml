name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please run `open-researcher doctor` and paste the output below.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. `open-researcher init`
        2. `open-researcher run --agent claude-code`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste the output of `open-researcher doctor`
      render: text
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true

  - type: input
    id: agent
    attributes:
      label: Agent used
      placeholder: "claude-code / codex / aider / opencode"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste from `.research/run.log` or terminal output.
      render: text
